[project]
name = "multimodal-hybrid-rag"
version = "0.1.0"
requires-python = ">=3.11"
dependencies = [
    "fastapi>=0.115.0",
    "uvicorn[standard]>=0.30.0",
    "pydantic>=2.9.0",
    "pydantic-settings>=2.5.0",
    "sqlalchemy[asyncio]>=2.0.35",
    "alembic>=1.13.0",
    "asyncpg>=0.29.0",
    "python-multipart>=0.0.9",           # for file uploads
    "pillow>=10.4.0",                     # image processing
    "sentence-transformers>=3.1.0",
    "torch>=2.4.0",                       # CPU version is fine for hackathon
    "torchvision>=0.19.0",
    "open-clip-torch>=2.26.0",            # for CLIP (better than original openai/CLIP for many models)
    "faiss-cpu>=1.8.0",                   # or faiss-gpu if you have CUDA
    "rank-bm25>=0.2.2",
    "nltk>=3.9.1",                        # for chunking (punkt tokenizer)
    "python-docx>=1.1.0",
    "pypdf>=4.3.0",
    "python-pptx>=0.6.23",
    "structlog>=24.4.0",                  # structured JSON logging
    "httpx>=0.27.0",
    "python-jose[cryptography]>=3.3.0",   # if you want JWT later
    "passlib[bcrypt]>=1.7.4",             # if auth is added later
]

[tool.uv]
dev-dependencies = [
    "black>=24.0.0",
    "isort>=5.13.0",
    "mypy>=1.10.0",
    "pytest>=8.0.0",
    "pytest-asyncio>=0.23.0",
]

[project.scripts]
start = "uvicorn main:app --reload --host 0.0.0.0 --port 8000"